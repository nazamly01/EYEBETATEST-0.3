<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>𝐒𝐢𝐠𝐧 𝐈𝐧 - 𝐄𝐘𝐄ᵀᴹ</title>
<link rel="icon" type="image/png" href="pics/1.png">
<link rel="stylesheet" href="css/shared.css" />
<link rel="stylesheet" href="css/login.css" />
</head>
<body>
<div id="pageLoader" class="page-loader"><div class="loader-logo">eye</div><div class="loader-bar"></div></div>
<div id="navbar-container"></div>

<main class="login-page">
  <div class="login-card">
    <div class="login-logo">eye</div>
    <div class="login-sub">Sign in to your account</div>
    <form onsubmit="submitLogin(event)">
      <div class="login-field">
        <label class="login-label" for="loginEmail">Email</label>
        <input class="login-input" id="loginEmail" type="email" autocomplete="username" required />
      </div>
      <div class="login-field">
        <label class="login-label" for="loginPass">Password</label>
        <input class="login-input" id="loginPass" type="password" autocomplete="current-password" required />
      </div>
      <div id="loginError"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;padding:16px">Sign In</button>
    </form>
    <p class="login-hint" style="text-align:center;margin-top:24px;margin-bottom:0">
      New here? <a href="register.html" style="color:var(--gold);text-decoration:none">Create an account</a>
    </p>
  </div>
</main>

<div id="footer-container"></div>
<div class="toast" id="toast"></div>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/shared.js"></script>
<script src="js/login.js"></script>
</body>
</html>

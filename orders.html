<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>𝐌𝐲 𝐎𝐫𝐝𝐞𝐫𝐬 - 𝐄𝐘𝐄ᵀᴹ </title>
<link rel="icon" type="image/png" href="pics/1.png">
<link rel="stylesheet" href="css/shared.css" />
<link rel="stylesheet" href="css/orders.css" />
</head>
<body>
<div id="pageLoader" class="page-loader"><div class="loader-logo">eye</div><div class="loader-bar"></div></div>
<div id="navbar-container"></div>

<div class="orders-wrap">
  <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px">
    <h1 class="page-title">My <em style="font-style:italic">Orders</em></h1>
    <a href="profile.html" class="btn btn-ghost" style="font-size:11px;letter-spacing:.15em">← Back to Profile</a>
  </div>
  <p class="page-sub" id="ordersMeta">— orders</p>

  <div class="order-filters">
    <button type="button" class="status-filter active" onclick="filterOrders('all',this)">All</button>
    <button type="button" class="status-filter" onclick="filterOrders('Pending',this)">Pending</button>
    <button type="button" class="status-filter" onclick="filterOrders('Processing',this)">Processing</button>
    <button type="button" class="status-filter" onclick="filterOrders('Shipped',this)">Shipped</button>
    <button type="button" class="status-filter" onclick="filterOrders('Delivered',this)">Delivered</button>
    <button type="button" class="status-filter" onclick="filterOrders('Returned',this)">Returned</button>
  </div>

  <div id="ordersList"></div>
</div>

<div id="footer-container"></div>
<div class="toast" id="toast"></div>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/shared.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
